<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>스위티스윙 강습 신청 명단</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="students">
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="신청 페이지로 이동">
        <img src="./assets/sweety-swing-logo-transparent.svg" alt="Sweety Swing Lindy Hop" />
      </a>
      <nav class="header-actions utility-nav" aria-label="공개 페이지">
        <a href="./index.html">강습신청</a>
      </nav>
    </header>

    <main class="admin-main">
      <section class="page-hero">
        <p id="rosterTerm" class="eyebrow">신청확인</p>
        <h1>강습 신청 명단</h1>
      </section>

      <section class="toolbar panel">
        <label>
          <span>강습 선택</span>
          <select id="lessonFilter" disabled>
            <option>명단 불러오는 중</option>
          </select>
        </label>
      </section>

      <div id="rosterContent" class="roster-stack" aria-live="polite">
        <section class="panel roster-loading" role="status">
          <span class="loading-spinner" aria-hidden="true"></span>
          <strong>명단을 불러오는 중입니다.</strong>
        </section>
      </div>
    </main>

    <p id="toast" class="toast" hidden></p>
    <script src="./data.js?v=20260521-poster-cache"></script>
    <script src="./dashboard.js?v=20260521-poster-cache"></script>
  </body>
</html>
